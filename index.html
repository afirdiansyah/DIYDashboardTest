<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Jalan DIY - Professional Edition</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        /* --- TAMPILAN UTAMA: MODE TERANG --- */
        :root {
            --bg: #ffffff;
            --header-bg: #005e95;
            --sidebar-bg: #f8f9fa;
            --text-header: #ffffff;
            --text-sidebar: #212529;
            --accent: #e67e22;
            --border: #ced4da;
            --shadow: rgba(0, 0, 0, 0.1);
            --tab-inactive: #e9ecef;
        }

        /* --- TAMPILAN KEDUA: MODE GELAP --- */
        [data-theme="dark"] {
            --bg: #0a0a0a;
            --header-bg: #141414;
            --sidebar-bg: #111111;
            --text-header: #ffffff;
            --text-sidebar: #e0e0e0;
            --accent: #ff0000;
            --border: #333333;
            --shadow: rgba(0, 0, 0, 0.5);
            --tab-inactive: #222222;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            transition: background 0.3s ease;
            overflow: hidden;
        }

        header {
            height: 60px;
            background-color: var(--header-bg);
            color: var(--text-header);
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 3px solid var(--accent);
            justify-content: space-between;
            box-shadow: 0 2px 10px var(--shadow);
            z-index: 2000;
        }

        .main-container { display: flex; height: calc(100vh - 60px); width: 100%; }

        .sidebar {
            width: 320px;
            background-color: var(--sidebar-bg);
            color: var(--text-sidebar);
            padding: 20px;
            border-right: 2px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 1000;
            overflow-y: auto;
            box-shadow: 4px 0 15px var(--shadow);
        }

        #map { flex-grow: 1; background: #888; }

        .layer-tabs {
            display: flex; background: var(--tab-inactive); padding: 4px;
            border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--border);
        }

        .tab-btn {
            flex: 1; padding: 10px; border: none; background: transparent;
            color: var(--text-sidebar); cursor: pointer; font-weight: bold;
            font-size: 12px; border-radius: 6px; transition: 0.3s; opacity: 0.6;
        }

        .tab-btn.active {
            background: var(--accent); color: white; opacity: 1;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }

        .theme-btn {
            background: var(--accent); color: white !important; border: none;
            padding: 9px 18px; border-radius: 4px; cursor: pointer;
            font-weight: bold; font-size: 11px; transition: 0.2s;
        }

        .stat-box {
            padding: 15px; background: rgba(128, 128, 128, 0.05);
            border-radius: 12px; border: 1px solid var(--border);
            margin-bottom: 10px; text-align: center;
        }

        #total-count { margin: 5px 0; color: var(--accent); font-size: 2.2rem; font-weight: 800; }

        .legend-item { display: flex; align-items: center; margin-bottom: 10px; font-size: 13px; font-weight: 500; }
        .line-sample { height: 6px; width: 30px; margin-right: 12px; border-radius: 3px; }

        .chart-container {
            margin-top: 20px; padding-top: 20px; border-top: 2px solid var(--border);
            height: 25vh; min-height: 200px;
        }

        .popup-title { font-weight: bold; font-size: 14px; color: #005e95; display: block; border-bottom: 2px solid var(--accent); margin-bottom: 5px; }
        .popup-table { width: 100%; font-size: 12px; border-collapse: collapse; }
        .popup-table td { padding: 3px 0; border-bottom: 1px solid #eee; }

        @media (max-width: 768px) {
            .main-container { flex-direction: column; }
            .sidebar { width: 100%; height: auto; border-right: none; }
            #map { height: 50vh; }
        }
    </style>
</head>

<body>

    <header>
        <span style="font-weight: 800; letter-spacing: 1px; font-size: 0.9rem;">KONDISI JALAN DIY (2024-2025)</span>
        <button class="theme-btn" onclick="toggleTheme()">SWITCH THEME</button>
    </header>

    <div class="main-container">
        <div class="sidebar">
            <div class="layer-tabs">
                <button onclick="switchLayer('2025')" id="tab-2025" class="tab-btn active">TAHUN 2025</button>
                <button onclick="switchLayer('2024')" id="tab-2024" class="tab-btn">TAHUN 2024</button>
            </div>

            <h3 style="margin-top:0; font-size: 0.9rem; opacity: 0.8;">Legenda Kondisi</h3>
            <div id="legend"></div>

            <div class="stat-box">
                <small style="opacity:0.7; text-transform: uppercase; font-size: 10px; font-weight: 700;" id="year-label">Total Segmen (2025):</small>
                <h2 id="total-count">0</h2>
            </div>

            <div class="chart-container">
                <h4 style="margin: 0 0 10px 0; font-size: 0.8rem; text-transform: uppercase; opacity: 0.6; text-align: center;">Statistik Kondisi</h4>
                <canvas id="conditionChart"></canvas>
            </div>
        </div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        let currentTheme = 'light';
        let activeYear = '2025';
        let myChart, dataLayers = {}, rawDataStore = {};
        let lastClickedLayer = null; 

        const map = L.map('map').setView([-7.7956, 110.3695], 11);
        const darkTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: 'CARTO' });
        const lightTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution: 'CARTO' });
        lightTiles.addTo(map);

        const colorPalette = {
            dark: { 'Baik': '#00ff00', 'Sedang': '#ffff00', 'Ringan': '#ff9900', 'Berat': '#ff0000' },
            light: { 'Baik': '#2e7d32', 'Sedang': '#fbc02d', 'Ringan': '#ef6c00', 'Berat': '#c62828' }
        };

        function getProp(props, target) {
            const key = Object.keys(props).find(k => k.toLowerCase() === target.toLowerCase());
            return key ? props[key] : null;
        }

        function getColor(kondisi, theme) {
            if (!kondisi) return '#888';
            const k = kondisi.toString().toLowerCase();
            const p = colorPalette[theme];
            if (k.includes('baik')) return p['Baik'];
            if (k.includes('sedang')) return p['Sedang'];
            if (k.includes('ringan')) return p['Ringan'];
            if (k.includes('berat')) return p['Berat'];
            return '#888';
        }

        function createGeoLayer(data, theme) {
            const layerGroup = L.geoJSON(data, {
                style: (f) => ({ 
                    color: getColor(getProp(f.properties, 'KONDISI'), theme), 
                    weight: 5, 
                    opacity: 0.8, 
                    lineCap: 'round' 
                }),
                onEachFeature: (f, l) => {
                    const p = f.properties;
                    
                    l.on('click', function(e) {
                        // 1. Reset Highlight Sebelumnya
                        if (lastClickedLayer) {
                            layerGroup.resetStyle(lastClickedLayer);
                        }

                        // 2. Set Highlight Baru
                        lastClickedLayer = l;
                        const hColor = (currentTheme === 'dark') ? '#ffffff' : '#00ffff';
                        
                        l.setStyle({
                            color: hColor,
                            weight: 12,
                            opacity: 1
                        });

                        // 3. Bring to Front
                        if (!L.Browser.ie && !L.Browser.opera && !L.Browser.edge) {
                            l.bringToFront();
                        }
                    });

                    l.bindPopup(`
                        <span class="popup-title">${getProp(p, 'LINK_NAME') || getProp(p, 'NAMA') || 'Jalan'}</span>
                        <table class="popup-table">
                            <tr><td><b>Kondisi</b></td><td style="color:${getColor(getProp(p, 'KONDISI'), theme)};font-weight:bold">${getProp(p, 'KONDISI')}</td></tr>
                            <tr><td><b>IRI</b></td><td>${getProp(p, 'IRI') || '-'}</td></tr>
                            <tr><td><b>PCI</b></td><td>${getProp(p, 'PCI') || '-'}</td></tr>
                        </table>
                    `);
                }
            });
            return layerGroup;
        }

        // Reset highlight kalau klik peta kosong
        map.on('click', function(e) {
            if (lastClickedLayer && e.originalEvent.target.id === 'map') {
                dataLayers[activeYear].resetStyle(lastClickedLayer);
                lastClickedLayer = null;
            }
        });

        function switchLayer(year) {
            activeYear = year;
            lastClickedLayer = null; 
            
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${year}`).classList.add('active');

            Object.keys(dataLayers).forEach(y => map.removeLayer(dataLayers[y]));
            dataLayers[year].addTo(map);

            updateUI(rawDataStore[year], year);
        }

        function updateUI(data, year) {
            const p = colorPalette[currentTheme];
            document.getElementById('legend').innerHTML = `
                <div class="legend-item"><div class="line-sample" style="background:${p.Baik}"></div> Baik</div>
                <div class="legend-item"><div class="line-sample" style="background:${p.Sedang}"></div> Sedang</div>
                <div class="legend-item"><div class="line-sample" style="background:${p.Ringan}"></div> Rusak Ringan</div>
                <div class="legend-item"><div class="line-sample" style="background:${p.Berat}"></div> Rusak Berat</div>
            `;
            document.getElementById('year-label').innerText = `Total Segmen (${year}):`;
            document.getElementById('total-count').innerText = data.features.length;

            let counts = { 'Baik': 0, 'Sedang': 0, 'Rusak Ringan': 0, 'Rusak Berat': 0 };
            data.features.forEach(f => {
                const val = getProp(f.properties, 'KONDISI');
                const k = val ? val.toString().toLowerCase() : "";
                if (k.includes('baik')) counts['Baik']++;
                else if (k.includes('sedang')) counts['Sedang']++;
                else if (k.includes('ringan')) counts['Rusak Ringan']++;
                else if (k.includes('berat')) counts['Rusak Berat']++;
            });
            renderChart(counts);
        }

        function renderChart(counts) {
            const ctx = document.getElementById('conditionChart').getContext('2d');
            const centerColor = (currentTheme === 'light') ? '#000' : '#fff';
            const p = colorPalette[currentTheme];
            const total = counts.Baik + counts.Sedang + counts['Rusak Ringan'] + counts['Rusak Berat'];

            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Baik', 'Sedang', 'Rusak Ringan', 'Rusak Berat'],
                    datasets: [{ data: [counts.Baik, counts.Sedang, counts['Rusak Ringan'], counts['Rusak Berat']], backgroundColor: [p.Baik, p.Sedang, p.Ringan, p.Berat], borderWidth: 0 }]
                },
                options: { maintainAspectRatio: false, cutout: '72%', plugins: { legend: { display: false } } },
                plugins: [{
                    beforeDraw: (chart) => {
                        const { width, height, ctx } = chart;
                        ctx.restore();
                        ctx.font = `bold ${(height / 8).toFixed(0)}px sans-serif`;
                        ctx.fillStyle = centerColor;
                        ctx.textBaseline = "middle";
                        const text = total || 0;
                        ctx.fillText(text, (width - ctx.measureText(text).width) / 2, height / 2);
                        ctx.save();
                    }
                }]
            });
        }

        function toggleTheme() {
            currentTheme = (currentTheme === 'light') ? 'dark' : 'light';
            lastClickedLayer = null; 

            if (currentTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                map.removeLayer(lightTiles); darkTiles.addTo(map);
            } else {
                document.documentElement.removeAttribute('data-theme');
                map.removeLayer(darkTiles); lightTiles.addTo(map);
            }
            
            Object.keys(rawDataStore).forEach(y => {
                const wasActive = map.hasLayer(dataLayers[y]);
                if (wasActive) map.removeLayer(dataLayers[y]);
                dataLayers[y] = createGeoLayer(rawDataStore[y], currentTheme);
                if (wasActive) dataLayers[y].addTo(map);
            });

            updateUI(rawDataStore[activeYear], activeYear);
        }

        async function init() {
            try {
                const [res25, res24] = await Promise.all([fetch('DIY.geojson'), fetch('DIY24.geojson')]);
                rawDataStore["2025"] = await res25.json();
                rawDataStore["2024"] = await res24.json();

                dataLayers["2025"] = createGeoLayer(rawDataStore["2025"], currentTheme);
                dataLayers["2024"] = createGeoLayer(rawDataStore["2024"], currentTheme);

                dataLayers["2025"].addTo(map);
                updateUI(rawDataStore["2025"], "2025");
                map.fitBounds(dataLayers["2025"].getBounds());
            } catch (e) { console.error("Data error!", e); }
        }

        init();
    </script>
</body>
</html>
